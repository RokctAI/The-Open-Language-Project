name: Code Quality

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: RokctAI/shared-workflows/.github/workflows/universal-linter.yml@main
    secrets: inherit


